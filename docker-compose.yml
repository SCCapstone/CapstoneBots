version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: capstonebots-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capstonebots
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capstonebots-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capstonebots-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/capstonebots
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capstonebots
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - capstonebots-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: capstonebots-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - capstonebots-network

volumes:
  postgres_data:

networks:
  capstonebots-network:
    driver: bridge
