services:
  db:
    image: postgres:15-alpine
    container_name: capstonebots-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capstonebots
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capstonebots-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capstonebots-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/capstonebots
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capstonebots
      JWT_SECRET: ${JWT_SECRET}
      INVITE_EXPIRY_DAYS: "7"
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.us-east-1.amazonaws.com}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      # Set S3_SECURE=false and S3_ENDPOINT=http://minio:9000 to use local MinIO instead of AWS S3
      S3_SECURE: ${S3_SECURE:-true}
      S3_BUCKET: ${S3_BUCKET:-blender-vcs-prod}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - capstonebots-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: capstonebots-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - capstonebots-network

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - capstonebots-network

volumes:
  minio_data:
  postgres_data:


networks:
  capstonebots-network:
    driver: bridge
