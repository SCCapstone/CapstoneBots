services:
  db:
    image: postgres:15-alpine
    container_name: capstonebots-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capstonebots
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capstonebots-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capstonebots-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/capstonebots
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capstonebots
      JWT_SECRET: ${JWT_SECRET}
      INVITE_EXPIRY_DAYS: "7"
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.us-east-1.amazonaws.com}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_SECURE: ${S3_SECURE:-true}
      S3_BUCKET: ${S3_BUCKET:-blender-vcs-prod}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      EMAIL_DEBUG: ${EMAIL_DEBUG:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - capstonebots-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: capstonebots-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - capstonebots-network

volumes:
  postgres_data:


networks:
  capstonebots-network:
    driver: bridge
